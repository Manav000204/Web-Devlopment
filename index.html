<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexbox Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<section class="hero">
    <div class="left">
        <img src="https://thumbnail.imgbin.com/19/8/10/washing-machine-abstract-colorful-washing-machine-illustration-q9SnxZvP_t.jpg" alt="Laundry">
    </div>

    <div class="right">
        <div class="form-box">
            <h2>Hello Again!</h2>
            <p>Welcome back! we missed you!</p>

            <form class="form">
                <div class="input-group">
                    <label>Email</label>
                    <input type="email" placeholder="Email@site.com">
                </div>

                <div class="input-group">
                    <label>Password</label>
                    <input type="password" placeholder="Password">
                </div>

                <div class="form-extra">
                    <a href="#">Forgot Password</a>
                </div>

                <button type="submit">Login</button>

                <p class="register">
                    Not a member? <a href="#">Register Now</a>
                </p>
            </form>
        </div>
    </div>
</section>

</body>
</html>
